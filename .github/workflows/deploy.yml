name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material mkdocs-include-markdown-plugin

      - name: Build MkDocs
        run: mkdocs build -d dist/docs

      - name: Prepare Emulator Deployment 
        run: |
          # Copy emulator files to root
          cp index.html dist/
          cp -r engine dist/
          cp -r scripts dist/
          cp -r img dist/
          cp -r uf2s dist/
          cp LICENSE dist/
          cp README.md dist/
          
          # Copy raw docs folder to /emulator-docs/ for the About modal
          cp -r docs dist/emulator-docs
          
          # Clean up any unexpected build artifacts in emulator-docs
          find dist/emulator-docs -type f -not -name "*.md" -not -name "*.png" -not -name "*.jpg" -not -name "*.jpeg" -delete
          
          # Disable Jekyll on GitHub Pages so it doesn't fail parsing MkDocs markdown extensions
          touch dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
